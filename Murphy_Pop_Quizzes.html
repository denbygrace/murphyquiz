// ── STATE ─────────────────────────────────────────────────────────────────────
let currentSubject = null;
let currentTopic = null;
let currentQs = [];
let qIndex = 0;
let score = 0;
let revealed = false;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  const grid = document.getElementById('subjectGrid');
  Object.entries(SUBJECTS).forEach(([name, cfg]) => {
    const topics = Object.keys(QUIZZES[name] || {});
    if (!topics.length) return;
    const btn = document.createElement('button');
    btn.className = `subj-btn ${cfg.cls}`;
    btn.innerHTML = `<div class="subj-name">${name}</div><div class="subj-count">${topics.length} topic${topics.length!==1?'s':''}</div>`;
    btn.onclick = () => openSubject(name, cfg.color);
    grid.appendChild(btn);
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function goHome() { showScreen('home'); }

// ── TOPICS ────────────────────────────────────────────────────────────────────
function openSubject(subj, color) {
  currentSubject = subj;
  document.getElementById('menuSubjName').textContent = subj;
  document.getElementById('menuSubjSub').textContent = `${Object.keys(QUIZZES[subj]).length} topics available`;
  document.getElementById('menuSubjName').style.color = color;

  const list = document.getElementById('topicList');
  list.innerHTML = '';
  Object.entries(QUIZZES[subj]).forEach(([topic, data]) => {
    const item = document.createElement('div');
    item.className = 'topic-item';
    item.style.setProperty('--tc', color);
    item.innerHTML = `
      <div class="topic-dot" style="background:${color}"></div>
      <div class="topic-info">
        <div class="topic-name">${topic}</div>
        <div class="topic-meta">${data.label} · ${data.qs.length} questions</div>
      </div>
      <div class="topic-arrow">›</div>`;
    item.onclick = () => startQuiz(subj, topic, color);
    list.appendChild(item);
  });
  showScreen('topics');
}

function goTopics() { showScreen('topics'); }

// ── QUIZ ──────────────────────────────────────────────────────────────────────
function startQuiz(subj, topic, color) {
  currentSubject = subj;
  currentTopic = topic;
  currentQs = QUIZZES[subj][topic].qs;
  qIndex = 0;
  score = 0;
  revealed = false;

  // Apply subject colour
  document.querySelectorAll('.progress-fill').forEach(el => el.style.background = color);

  const cfg = SUBJECTS[subj];
  document.getElementById('quizSubjLabel').textContent = subj.toUpperCase();
  document.getElementById('quizSubjLabel').style.color = color;
  document.getElementById('quizTopicLabel').textContent = topic;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const wrap = document.getElementById('questionWrap');

  if (qIndex >= currentQs.length) {
    renderResult(wrap);
    return;
  }

  const q = currentQs[qIndex];
  const pct = (qIndex / currentQs.length) * 100;
  const color = SUBJECTS[currentSubject].color;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressTxt').textContent = `Q${qIndex+1} of ${currentQs.length}`;
  document.getElementById('scoreDisplay').textContent = `${score}/${currentQs.length}`;

  wrap.innerHTML = `
    <div class="q-card" id="qCard" style="--subj-color:${color}">
      <div class="q-card-top-bar" style="position:absolute;top:0;left:0;right:0;height:3px;background:${color}"></div>
      <div class="q-label">QUESTION ${qIndex + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="answer-area answer-hidden" id="answerArea">
        <div class="answer-label-txt" style="color:${color}">ANSWER</div>
        <div class="answer-text">${q.a}</div>
      </div>
      <div class="btn-row" id="btnRow">
        <button class="btn btn-reveal" onclick="revealAnswer()" style="background:${color}">Reveal Answer</button>
      </div>
    </div>`;
}

function revealAnswer() {
  document.getElementById('answerArea').classList.remove('answer-hidden');
  const color = SUBJECTS[currentSubject].color;
  document.getElementById('btnRow').innerHTML = `
    <button class="btn btn-got" onclick="mark(true)">✓ Got it!</button>
    <button class="btn btn-nope" onclick="mark(false)">✗ Not quite</button>`;
}

function mark(correct) {
  if (correct) score++;
  const card = document.getElementById('qCard');
  card.classList.add(correct ? 'flash-g' : 'flash-r');
  setTimeout(() => {
    qIndex++;
    renderQuestion();
  }, 450);
}

function renderResult(wrap) {
  const pct = score / currentQs.length;
  const color = SUBJECTS[currentSubject].color;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressTxt').textContent = 'Done!';
  document.getElementById('scoreDisplay').textContent = `${score}/${currentQs.length}`;

  let emoji, msg, sub;
  if (pct === 1) {
    emoji = '🏆'; msg = 'Perfect score!';
    sub = 'Full marks — this topic is locked in.\nKeep it sharp with the revision pack.';
  } else if (pct >= 0.6) {
    emoji = '💪'; msg = 'Solid effort!';
    sub = `${score} out of ${currentQs.length} — good foundation.\nReview the ones missed in the revision pack.`;
  } else {
    emoji = '📚'; msg = 'More reps needed!';
    sub = `${score} out of ${currentQs.length}.\nFlashcard time — flip through the relevant cards tonight.`;
  }

  wrap.innerHTML = `
    <div class="result-wrap">
      <div class="result-card">
        <span class="result-emoji">${emoji}</span>
        <div class="result-score">${score}<em>/${currentQs.length}</em></div>
        <div class="result-msg">${msg}</div>
        <div class="result-sub">${sub}</div>
        <button class="btn-again" onclick="startQuiz('${currentSubject}','${currentTopic}','${color}')" style="background:${color}">Try again</button>
        <button class="btn-menu" onclick="goTopics()">← Back to topics</button>
      </div>
    </div>`;
}

init();
</script>
